name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, curl, mbstring, openssl, gd, json, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Syntax check (php -l)
        run: find src config -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Verify build output
        run: |
          test -f portal/dist/merged/dataTables.min.js
          test -f portal/dist/merged/fullcalendar.min.js
          test -f portal/dist/bootstrap/dist/js/bootstrap.bundle.min.js
